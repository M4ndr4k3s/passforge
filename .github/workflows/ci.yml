name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # o teste de criptografia usa só WebCrypto do Node — sem dependências
      - name: Teste de criptografia (round-trip .pfdb)
        run: npm test
